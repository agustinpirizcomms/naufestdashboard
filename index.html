<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAufest 2026 - Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#2f5aae',
                        brandBlueLight: '#4a75cf',
                        brandText: '#272626',
                        brandBgLight: '#f4f5f7',
                        brandDark: '#121212',
                        brandPurple: '#9463ae',
                        brandTerracotta: '#be574b',
                        brandCyan: '#86dbe0',
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'Arial', 'Helvetica', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #272626; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-white text-brandText">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const API_KEY = 'bPMCXYtl6CjBRURW_f9GdmZY1a-22ODV7mkXfYj5qDpnSElgzhg1nvER4Ok';
        const SPREADSHEET_ID = '1Zg_GWkEzKW4uBYCS4Aa33Y-YR3jB_2OEE52PrUMDbn8';
        const SHEET_NAME = 'MASTER';
        const BASE_URL = 'https://api.sheetson.com';

        const EventDashboard = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('public');
            const [savingIds, setSavingIds] = useState(new Set());
            const [lastSync, setLastSync] = useState(null);

            const fetchData = useCallback(async (isSilent = false) => {
                if (!isSilent) setLoading(true);
                setError(null);
                try {
                    const cacheBuster = `?t=${new Date().getTime()}`;
                    const response = await fetch(`${BASE_URL}/v2/sheets/${SHEET_NAME}${cacheBuster}`, {
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'X-Spreadsheet-Id': SPREADSHEET_ID
                        },
                        cache: 'no-store'
                    });
                    if (!response.ok) throw new Error(`Error ${response.status}: Problema de conexión con el servidor.`);
                    const json = await response.json();
                    const results = json.results || [];
                    const sorted = [...results].sort((a, b) => (a.hora_inicio || '').localeCompare(b.hora_inicio || ''));
                    setData(sorted);
                    setLastSync(new Date().toLocaleTimeString());
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
                const interval = setInterval(() => fetchData(true), 60000);
                return () => clearInterval(interval);
            }, [fetchData]);

            const updateCell = async (rowIndex, field, value) => {
                setData(prev => prev.map(item => item.row === rowIndex ? { ...item, [field]: value } : item));
                setSavingIds(prev => new Set(prev).add(rowIndex));
                try {
                    const response = await fetch(`${BASE_URL}/v2/sheets/${SHEET_NAME}/${rowIndex}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'X-Spreadsheet-Id': SPREADSHEET_ID,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ [field]: value })
                    });
                    if (!response.ok) throw new Error('Error al actualizar fila');
                } catch (err) {
                    alert(`Error al guardar ${field}: ${err.message}`);
                } finally {
                    setSavingIds(prev => {
                        const next = new Set(prev);
                        next.delete(rowIndex);
                        return next;
                    });
                }
            };

            const getStatusStyles = (estado) => {
                const e = estado?.toLowerCase() || '';
                if (e === 'en curso') return {
                    container: 'border-l-4 border-green-500 bg-green-50/50 ring-1 ring-green-200',
                    badge: 'bg-green-500 text-white animate-pulse',
                    text: 'text-green-700',
                    icon: '🟢'
                };
                if (e === 'demorado') return {
                    container: 'border-l-4 border-brandTerracotta bg-brandBgLight ring-1 ring-brandTerracotta/20',
                    badge: 'bg-brandTerracotta text-white',
                    text: 'text-brandTerracotta',
                    icon: '⚠️'
                };
                if (e === 'completado') return {
                    container: 'border-l-4 border-slate-300 bg-slate-50 opacity-60 grayscale-[0.5]',
                    badge: 'bg-slate-400 text-white',
                    text: 'text-slate-500',
                    icon: '✅'
                };
                return {
                    container: 'border-l-4 border-slate-300 bg-white ring-1 ring-slate-200',
                    badge: 'bg-slate-400 text-white',
                    text: 'text-slate-600',
                    icon: '🕒'
                };
            };

            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const rol = (item.rol_vista || '').toLowerCase();
                    return view === 'public' ? rol.includes('publico') : rol.includes('staff');
                });
            }, [data, view]);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-brandBlue border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-brandText font-semibold">Sincronizando NAufest 2026...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-white">
                    <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-red-100 text-center">
                        <div className="text-red-500 text-5xl mb-4">⚠️</div>
                        <h2 className="text-xl font-bold text-brandText mb-2">Error de Conexión</h2>
                        <div className="bg-red-50 text-red-700 p-3 rounded-xl text-sm font-mono mb-6 border border-red-200">{error}</div>
                        {window.location.protocol === 'file:' && (
                            <div className="mb-6 p-4 bg-amber-50 border border-amber-200 rounded-2xl text-left text-xs text-amber-800">
                                <strong className="block mb-1 uppercase font-bold">Sugerencia Técnica:</strong>
                                Estás abriendo el archivo localmente. Usa <strong className="text-brandBlue">Live Server</strong> o súbelo a la nube para habilitar la API.
                            </div>
                        )}
                        <button onClick={fetchData} className="w-full py-3 px-6 bg-brandBlue text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all">
                            Reintentar Conexión
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen font-montserrat">
                    <header className="bg-brandCyan py-6 px-4 md:px-12 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-6">
                                <img src="https://naufest.com/wp-content/uploads/2026/06/LOGO-NAUFEST.png" alt="NAufest 2026" className="h-16 w-auto object-contain" />
                                <div className="hidden md:block">
                                    <div className="flex items-center gap-2">
                                        <button
                                            onClick={() => fetchData(false)}
                                            className="p-2 bg-white/50 hover:bg-white rounded-full transition-colors border border-white/50"
                                            title="Sincronizar ahora"
                                        >
                                            🔄
                                        </button>
                                        <span className="text-xs font-bold text-brandText/60 uppercase tracking-widest">Sincronizado: {lastSync || '...'}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="flex p-1 bg-white/40 backdrop-blur-md rounded-2xl w-fit border border-white/50">
                                <button
                                    onClick={() => setView('public')}
                                    className={`px-6 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all ${view === 'public' ? 'bg-brandBlue text-white shadow-md' : 'text-brandText hover:bg-white/60'}`}
                                >
                                    👤 Asistente
                                </button>
                                <button
                                    onClick={() => setView('staff')}
                                    className={`px-6 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all ${view === 'staff' ? 'bg-brandBlue text-white shadow-md' : 'text-brandText hover:bg-white/60'}`}
                                >
                                    🛠️ Staff
                                </button>
                            </div>
                        </div}
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 md:py-12">
                        {filteredData.length === 0 ? (
                            <div className="text-center py-20 bg-brandBgLight rounded-3xl border-2 border-dashed border-slate-200">
                                <p className="text-slate-400 font-medium">No hay actividades programadas para esta vista.</p>
                            </div>
                        ) : (
                            <div className="animate-in fade-in duration-500">
                                {view === 'public' ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredData.map(item => {
                                            const styles = getStatusStyles(item.estado);
                                            return (
                                                <div key={item.id} className={`p-6 rounded-3xl transition-all hover:shadow-xl ${styles.container}`}>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <span className="text-[10px] font-bold text-brandText/50 uppercase tracking-wider bg-white px-2 py-1 rounded-lg border border-slate-200">
                                                            {item.hora_inicio} - {item.hora_fin}
                                                        </span>
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${styles.badge}`}>
                                                            {item.estado}
                                                        </span>
                                                    </div>
                                                    <h3 className="text-xl font-extrabold text-brandText mb-3 leading-tight">{item.actividad}</h3>
                                                    <div className="flex items-center text-brandText/70 text-sm font-bold">
                                                        <span className="mr-2 text-brandBlue">📍</span> {item.lugar}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-brandBgLight border-b border-slate-200">
                                                    <tr className="text-brandText">
                                                        <th className="px-6 py-4 text-[10px] font-black uppercase tracking-widest">🕒 Tiempo / Bloque</th>
                                                        <th className="px-6 py-4 text-[10px] font-black uppercase tracking-widest">Actividad</th>
                                                        <th className="px-6 py-4 text-[10px] font-black uppercase tracking-widest">Lugar / Resp.</th>
                                                        <th className="px-6 py-4 text-[10px] font-black uppercase tracking-widest">Estado</th>
                                                        <th className="px-6 py-4 text-[10px] font-black uppercase tracking-widest">Notas Técnicas</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredData.map(item => {
                                                        const styles = getStatusStyles(item.estado);
                                                        const isSaving = savingIds.has(item.row);
                                                        return (
                                                            <tr key={item.id} className={`transition-all group ${styles.container} ${isSaving ? 'bg-brandBlue/10' : ''}`}>
                                                                <td className="px-6 py-4">
                                                                    <div className="flex items-center gap-2">
                                                                        <input
                                                                            type="text"
                                                                            value={item.hora_inicio}
                                                                            onChange={(e) => updateCell(item.row, 'hora_inicio', e.target.value)}
                                                                            className="font-bold text-brandText bg-transparent border-b border-transparent hover:border-brandBlue focus:border-brandBlue outline-none w-12 text-sm"
                                                                        />
                                                                        <span className="text-slate-300 text-xs">→</span>
                                                                        <input
                                                                            type="text"
                                                                            value={item.hora_fin}
                                                                            onChange={(e) => updateCell(item.row, 'hora_fin', e.target.value)}
                                                                            className="font-bold text-brandText bg-transparent border-b border-transparent hover:border-brandBlue focus:border-brandBlue outline-none w-12 text-sm"
                                                                        />
                                                                    </div>
                                                                    <div className="text-[9px] font-black text-white bg-brandPurple px-2 py-0.5 rounded mt-1 w-fit uppercase tracking-tighter">
                                                                        {item.bloque}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4 font-bold text-brandText">{item.actividad}</td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-xs font-bold text-brandText">{item.lugar}</div>
                                                                    <div className="text-[10px] text-brandBlue font-black uppercase tracking-tighter">{item.responsable}</div>
                                                                </td>
                                                                <td className="px-6 py-4 relative">
                                                                    <div className="flex items-center gap-3">
                                                                        <select
                                                                            value={item.estado}
                                                                            onChange={(e) => updateCell(item.row, 'estado', e.target.value)}
                                                                            className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest outline-none cursor-pointer transition-all ring-1 ring-inset ${styles.badge}`}
                                                                        >
                                                                            <option value="Pendiente">Pendiente</option>
                                                                            <option value="En Curso">En Curso</option>
                                                                            <option value="Demorado">Demorado</option>
                                                                            <option value="Completado">Completado</option>
                                                                        </select>
                                                                        {isSaving && <span className="text-[10px] font-bold text-brandBlue animate-pulse">Guardando...</span>}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <div className="p-3 rounded-xl bg-brandDark text-white text-[10px] font-mono leading-relaxed max-w-xs shadow-inner border border-slate-800">
                                                                        {item.notas_tecnicas || 'Sin notas técnicas'}
                                                                    </div>
                                                                </td>
                                                                </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : null}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EventDashboard />);
    </script>
</body>
</html>
