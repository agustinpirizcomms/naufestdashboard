<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAUFest 2026 — Dashboard de Gestión</title>
  <meta name="description" content="Dashboard de gestión y cronograma en tiempo real para NAUFest 2026. Visualización para público y staff técnico." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nau: {
              primary: '#2f5aae',
              secondary: '#22404d',
              lavanda: '#9463ae',
              terracota: '#be574b',
              dark: '#121212',
              light: '#f8fafc',
            }
          },
          fontFamily: {
            sans: ['Montserrat', 'Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- React 18 CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; margin: 0; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2f5aae44; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #2f5aae88; }

    /* Pulsing dot animation */
    @keyframes live-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .live-dot { animation: live-dot 1.2s ease-in-out infinite; }

    /* Shimmer loader */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Fade-in animation */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fade-in-up 0.5s ease-out both;
    }

    /* Stagger delay helper */
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }
    .stagger-6 { animation-delay: 0.3s; }
    .stagger-7 { animation-delay: 0.35s; }
    .stagger-8 { animation-delay: 0.4s; }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #2f5aae, #9463ae, #be574b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="bg-nau-light min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // ─── API Configuration ───────────────────────────────────────────
    const API_KEY = 'bPMCXYtl6CjBRURW_f9GdmZY1a-22ODV7mkXfYj5qDpnSElgzhg1nvER4Ok';
    const SPREADSHEET_ID = '1Zg_GWkEzKW4uBYCS4Aa33Y-YR3jB_2OEE52PrUMDbn8';
    const SHEET_NAME = 'MASTER';
    const BASE_URL = 'https://api.sheetson.com';

    // ─── Helper: parse "HH:MM" to minutes for sorting ───────────────
    const parseTime = (t) => {
      if (!t) return Infinity;
      const [h, m] = t.split(':').map(Number);
      return (h || 0) * 60 + (m || 0);
    };

    // ─── Status configuration ────────────────────────────────────────
    const STATUS_CONFIG = {
      'en curso': {
        badge: 'bg-emerald-500 text-white',
        card: 'border-emerald-400 bg-emerald-50/70',
        row: 'bg-emerald-50/60',
        label: 'En Curso',
        icon: '▶',
        pulse: true,
      },
      'demorado': {
        badge: 'bg-amber-500 text-white',
        card: 'border-amber-400 bg-amber-50/70',
        row: 'bg-amber-50/60',
        label: 'Demorado',
        icon: '⚠',
        pulse: false,
      },
      'completado': {
        badge: 'bg-slate-400 text-white',
        card: 'border-slate-300 bg-slate-100/60 opacity-60',
        row: 'bg-slate-50 opacity-60',
        label: 'Completado',
        icon: '✓',
        pulse: false,
      },
      'pendiente': {
        badge: 'bg-[#2f5aae] text-white',
        card: 'border-[#2f5aae]/20 bg-white',
        row: 'bg-white',
        label: 'Pendiente',
        icon: '◯',
        pulse: false,
      },
    };

    const getStatus = (estado) => {
      const key = (estado || '').toLowerCase().trim();
      return STATUS_CONFIG[key] || STATUS_CONFIG['pendiente'];
    };

    // ─── SVG Icons ────────────────────────────────────────────────────
    const IconClock = () => (
      <svg className="w-4 h-4 inline-block mr-1 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" />
      </svg>
    );

    const IconLocation = () => (
      <svg className="w-4 h-4 inline-block mr-1 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0L6.343 16.657a8 8 0 1111.314 0z" />
        <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const IconRefresh = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
    );

    const IconUser = () => (
      <svg className="w-4 h-4 inline-block mr-1 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    );

    const IconWrench = () => (
      <svg className="w-4 h-4 inline-block mr-1 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" />
      </svg>
    );

    // ─── Status Badge Component ───────────────────────────────────────
    const StatusBadge = ({ estado }) => {
      const s = getStatus(estado);
      return (
        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${s.badge} transition-all duration-300`}>
          {s.pulse && <span className="w-2 h-2 rounded-full bg-white live-dot" />}
          <span>{s.icon}</span>
          <span>{s.label}</span>
        </span>
      );
    };

    // ─── Skeleton Loader ─────────────────────────────────────────────
    const SkeletonCard = () => (
      <div className="rounded-2xl p-5 space-y-3 border border-slate-200 bg-white">
        <div className="shimmer h-5 w-24 rounded-full" />
        <div className="shimmer h-6 w-3/4 rounded-lg" />
        <div className="shimmer h-4 w-1/2 rounded-lg" />
        <div className="shimmer h-4 w-1/3 rounded-lg" />
      </div>
    );

    const SkeletonTable = () => (
      <div className="space-y-2">
        {[...Array(6)].map((_, i) => (
          <div key={i} className="shimmer h-12 rounded-xl" />
        ))}
      </div>
    );

    // ─── Public Card Component ────────────────────────────────────────
    const PublicCard = ({ item, index }) => {
      const s = getStatus(item.estado);
      const delay = Math.min(index, 8) * 0.06;
      return (
        <div
          className={`rounded-2xl border-2 p-5 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 ${s.card}`}
          style={{ animation: `fade-in-up 0.5s ease-out ${delay}s both` }}
        >
          {/* Top row: time & status */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center text-sm font-semibold text-[#22404d]">
              <IconClock />
              <span>{item.hora_inicio} — {item.hora_fin}</span>
            </div>
            <StatusBadge estado={item.estado} />
          </div>

          {/* Activity name */}
          <h3 className="text-lg font-bold text-[#121212] leading-snug mb-2">
            {item.actividad}
          </h3>

          {/* Location & Block */}
          <div className="flex flex-wrap items-center gap-3 text-sm text-slate-600">
            <span className="inline-flex items-center">
              <IconLocation />
              {item.lugar}
            </span>
            {item.bloque && (
              <span className="px-2.5 py-0.5 rounded-full bg-[#2f5aae]/10 text-[#2f5aae] text-xs font-semibold">
                {item.bloque}
              </span>
            )}
          </div>
        </div>
      );
    };

    // ─── Staff Table Row ──────────────────────────────────────────────
    const StaffRow = ({ item, index }) => {
      const s = getStatus(item.estado);
      const delay = Math.min(index, 8) * 0.04;
      return (
        <tr
          className={`${s.row} border-b border-slate-200/80 hover:bg-[#2f5aae]/5 transition-colors duration-200`}
          style={{ animation: `fade-in-up 0.4s ease-out ${delay}s both` }}
        >
          <td className="px-4 py-3 text-xs font-mono text-slate-400 whitespace-nowrap">{item.id}</td>
          <td className="px-4 py-3 text-sm font-semibold text-[#22404d] whitespace-nowrap">
            {item.hora_inicio} — {item.hora_fin}
          </td>
          <td className="px-4 py-3 text-sm font-bold text-[#121212] max-w-xs">{item.actividad}</td>
          <td className="px-4 py-3 text-sm text-slate-600 whitespace-nowrap">
            <span className="inline-flex items-center"><IconLocation />{item.lugar}</span>
          </td>
          <td className="px-4 py-3">
            <span className="px-2.5 py-0.5 rounded-full bg-[#9463ae]/15 text-[#9463ae] text-xs font-semibold whitespace-nowrap">
              {item.bloque}
            </span>
          </td>
          <td className="px-4 py-3 text-sm text-slate-600 whitespace-nowrap">
            <span className="inline-flex items-center"><IconUser />{item.responsable || '—'}</span>
          </td>
          <td className="px-4 py-3 max-w-xs">
            {item.notas_tecnicas ? (
              <div className="text-xs bg-[#be574b]/10 text-[#be574b] border border-[#be574b]/20 rounded-xl px-3 py-2 font-medium leading-relaxed">
                <span className="inline-flex items-center gap-1 font-bold mb-0.5"><IconWrench /> Nota Técnica:</span>
                <br />
                {item.notas_tecnicas}
              </div>
            ) : (
              <span className="text-xs text-slate-300 italic">Sin notas</span>
            )}
          </td>
          <td className="px-4 py-3"><StatusBadge estado={item.estado} /></td>
        </tr>
      );
    };

    // ─── Block Group Header (Public View) ──────────────────────────────
    const BlockGroupPublic = ({ bloque, items }) => (
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-4">
          <div className="h-px flex-1 bg-gradient-to-r from-[#2f5aae]/30 to-transparent" />
          <h2 className="text-sm font-extrabold uppercase tracking-widest text-[#2f5aae]">
            {bloque}
          </h2>
          <div className="h-px flex-1 bg-gradient-to-l from-[#2f5aae]/30 to-transparent" />
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {items.map((item, i) => (
            <PublicCard key={item.id || i} item={item} index={i} />
          ))}
        </div>
      </div>
    );

    // ═══════════════════════════════════════════════════════════════════
    // ─── MAIN DASHBOARD COMPONENT ─────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════
    const EventDashboard = () => {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [view, setView] = useState('publico'); // 'publico' | 'staff'
      const [filterBloque, setFilterBloque] = useState('Todos');
      const [filterEstado, setFilterEstado] = useState('Todos');
      const [lastUpdated, setLastUpdated] = useState(null);

      // ─── Fetch data ────────────────────────────────────────────
      const fetchData = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const url = `${BASE_URL}/v2/sheets/${SHEET_NAME}`;
          const res = await fetch(url, {
            headers: {
              'Authorization': `Bearer ${API_KEY}`,
              'X-Spreadsheet-Id': SPREADSHEET_ID,
            },
          });
          if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
          const json = await res.json();
          const sorted = (json.results || []).sort(
            (a, b) => parseTime(a.hora_inicio) - parseTime(b.hora_inicio)
          );
          setData(sorted);
          setLastUpdated(new Date());
        } catch (err) {
          setError(err.message || 'Error desconocido al obtener datos.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      // ─── Derived data ──────────────────────────────────────────
      const filteredData = useMemo(() => {
        let items = data;

        // Role filter
        if (view === 'publico') {
          items = items.filter(d => (d.rol_vista || '').toLowerCase().includes('publico'));
        } else {
          items = items.filter(d => (d.rol_vista || '').toLowerCase().includes('staff'));
        }

        // Bloque filter
        if (filterBloque !== 'Todos') {
          items = items.filter(d => d.bloque === filterBloque);
        }

        // Estado filter
        if (filterEstado !== 'Todos') {
          items = items.filter(d => (d.estado || '').toLowerCase() === filterEstado.toLowerCase());
        }

        return items;
      }, [data, view, filterBloque, filterEstado]);

      // Group by bloque for public view
      const groupedByBloque = useMemo(() => {
        const groups = {};
        filteredData.forEach(item => {
          const b = item.bloque || 'Sin bloque';
          if (!groups[b]) groups[b] = [];
          groups[b].push(item);
        });
        return groups;
      }, [filteredData]);

      // Unique bloques for filter
      const bloques = useMemo(() => {
        const set = new Set(data.map(d => d.bloque).filter(Boolean));
        return ['Todos', ...Array.from(set)];
      }, [data]);

      // Stats
      const stats = useMemo(() => {
        const viewItems = view === 'publico'
          ? data.filter(d => (d.rol_vista || '').toLowerCase().includes('publico'))
          : data.filter(d => (d.rol_vista || '').toLowerCase().includes('staff'));
        return {
          total: viewItems.length,
          enCurso: viewItems.filter(d => (d.estado || '').toLowerCase() === 'en curso').length,
          demorado: viewItems.filter(d => (d.estado || '').toLowerCase() === 'demorado').length,
          completado: viewItems.filter(d => (d.estado || '').toLowerCase() === 'completado').length,
          pendiente: viewItems.filter(d => (d.estado || '').toLowerCase() === 'pendiente').length,
        };
      }, [data, view]);

      // ─── Render ────────────────────────────────────────────────
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-blue-50/30">

          {/* ══════ HEADER ══════ */}
          <header className="relative overflow-hidden bg-gradient-to-r from-[#121212] via-[#22404d] to-[#121212]">
            {/* Decorative blurs */}
            <div className="absolute top-0 left-1/4 w-64 h-64 bg-[#2f5aae]/20 rounded-full blur-3xl" />
            <div className="absolute bottom-0 right-1/4 w-48 h-48 bg-[#9463ae]/20 rounded-full blur-3xl" />
            <div className="absolute top-1/2 right-10 w-32 h-32 bg-[#be574b]/15 rounded-full blur-2xl" />

            <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
              <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                {/* Brand */}
                <div>
                  <div className="flex items-center gap-3 mb-1">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#2f5aae] to-[#9463ae] flex items-center justify-center shadow-lg shadow-[#2f5aae]/30">
                      <span className="text-white font-black text-lg">N</span>
                    </div>
                    <div>
                      <h1 className="text-2xl sm:text-3xl font-black text-white tracking-tight">
                        NAU<span className="text-[#be574b]">Fest</span> <span className="text-[#9463ae] font-light">2026</span>
                      </h1>
                    </div>
                  </div>
                  <p className="text-slate-400 text-sm ml-[52px] -mt-1">Dashboard de Gestión · Cronograma en Vivo</p>
                </div>

                {/* Last updated & Refresh */}
                <div className="flex items-center gap-3">
                  {lastUpdated && (
                    <span className="text-xs text-slate-500">
                      Actualizado: {lastUpdated.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}
                    </span>
                  )}
                  <button
                    id="btn-refresh"
                    onClick={fetchData}
                    disabled={loading}
                    className="flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 text-white text-sm font-semibold transition-all duration-300 disabled:opacity-40 backdrop-blur-sm"
                  >
                    <span className={loading ? 'animate-spin' : ''}><IconRefresh /></span>
                    Actualizar
                  </button>
                </div>
              </div>

              {/* ──── VIEW TABS ──── */}
              <div className="mt-6 flex flex-wrap gap-2">
                <button
                  id="tab-publico"
                  onClick={() => { setView('publico'); setFilterBloque('Todos'); setFilterEstado('Todos'); }}
                  className={`px-6 py-2.5 rounded-full text-sm font-bold tracking-wide transition-all duration-300
                    ${view === 'publico'
                      ? 'bg-white text-[#2f5aae] shadow-lg shadow-[#2f5aae]/20 scale-105'
                      : 'bg-white/10 text-white/70 hover:bg-white/20 hover:text-white border border-white/10'
                    }`}
                >
                  🎶 &nbsp;Vista Asistente
                </button>
                <button
                  id="tab-staff"
                  onClick={() => { setView('staff'); setFilterBloque('Todos'); setFilterEstado('Todos'); }}
                  className={`px-6 py-2.5 rounded-full text-sm font-bold tracking-wide transition-all duration-300
                    ${view === 'staff'
                      ? 'bg-white text-[#22404d] shadow-lg shadow-[#22404d]/20 scale-105'
                      : 'bg-white/10 text-white/70 hover:bg-white/20 hover:text-white border border-white/10'
                    }`}
                >
                  🎛 &nbsp;Vista Staff Técnico
                </button>
              </div>
            </div>
          </header>

          {/* ══════ MAIN ══════ */}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">

            {/* ──── STATS BAR ──── */}
            {!loading && !error && (
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6" style={{ animation: 'fade-in-up 0.5s ease-out both' }}>
                {[
                  { label: 'Total', value: stats.total, color: 'from-[#2f5aae] to-[#9463ae]' },
                  { label: 'En Curso', value: stats.enCurso, color: 'from-emerald-500 to-emerald-600' },
                  { label: 'Pendiente', value: stats.pendiente, color: 'from-[#2f5aae] to-blue-600' },
                  { label: 'Demorado', value: stats.demorado, color: 'from-amber-500 to-orange-500' },
                  { label: 'Completado', value: stats.completado, color: 'from-slate-400 to-slate-500' },
                ].map((s, i) => (
                  <div key={i} className="relative overflow-hidden rounded-2xl bg-white border border-slate-200/80 p-4 hover:shadow-md transition-shadow duration-300">
                    <div className={`absolute top-0 left-0 w-1 h-full bg-gradient-to-b ${s.color}`} />
                    <p className="text-xs text-slate-500 font-semibold uppercase tracking-wider">{s.label}</p>
                    <p className="text-2xl font-black text-[#121212] mt-1">{s.value}</p>
                  </div>
                ))}
              </div>
            )}

            {/* ──── FILTERS ──── */}
            {!loading && !error && (
              <div className="flex flex-wrap items-center gap-3 mb-6" style={{ animation: 'fade-in-up 0.5s ease-out 0.1s both' }}>
                {/* Bloque filter */}
                <div className="flex items-center gap-2">
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Bloque:</label>
                  <select
                    id="filter-bloque"
                    value={filterBloque}
                    onChange={e => setFilterBloque(e.target.value)}
                    className="px-3 py-1.5 rounded-full border border-slate-200 bg-white text-sm text-[#121212] font-medium focus:outline-none focus:ring-2 focus:ring-[#2f5aae]/30 transition-all cursor-pointer"
                  >
                    {bloques.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                </div>

                {/* Estado filter */}
                <div className="flex items-center gap-2">
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Estado:</label>
                  <select
                    id="filter-estado"
                    value={filterEstado}
                    onChange={e => setFilterEstado(e.target.value)}
                    className="px-3 py-1.5 rounded-full border border-slate-200 bg-white text-sm text-[#121212] font-medium focus:outline-none focus:ring-2 focus:ring-[#2f5aae]/30 transition-all cursor-pointer"
                  >
                    {['Todos', 'En Curso', 'Pendiente', 'Demorado', 'Completado'].map(e => (
                      <option key={e} value={e}>{e}</option>
                    ))}
                  </select>
                </div>

                {/* Result count */}
                <span className="ml-auto text-xs text-slate-400 font-medium">
                  {filteredData.length} actividad{filteredData.length !== 1 ? 'es' : ''}
                </span>
              </div>
            )}

            {/* ──── LOADING STATE ──── */}
            {loading && (
              <div className="space-y-6">
                <div className="flex items-center justify-center gap-3 py-8">
                  <div className="w-8 h-8 border-4 border-[#2f5aae]/20 border-t-[#2f5aae] rounded-full animate-spin" />
                  <span className="text-[#2f5aae] font-semibold text-lg">Cargando cronograma...</span>
                </div>
                {view === 'publico' ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {[...Array(6)].map((_, i) => <SkeletonCard key={i} />)}
                  </div>
                ) : (
                  <SkeletonTable />
                )}
              </div>
            )}

            {/* ──── ERROR STATE ──── */}
            {error && (
              <div className="flex flex-col items-center justify-center py-16" style={{ animation: 'fade-in-up 0.5s ease-out both' }}>
                <div className="w-20 h-20 rounded-full bg-[#be574b]/10 flex items-center justify-center mb-4">
                  <span className="text-4xl">⚠️</span>
                </div>
                <h2 className="text-xl font-bold text-[#121212] mb-2">Error al cargar datos</h2>
                <p className="text-slate-500 text-sm text-center max-w-md mb-6">{error}</p>
                <button
                  id="btn-retry"
                  onClick={fetchData}
                  className="px-6 py-3 rounded-full bg-gradient-to-r from-[#2f5aae] to-[#9463ae] text-white font-bold text-sm shadow-lg shadow-[#2f5aae]/30 hover:shadow-xl hover:scale-105 transition-all duration-300"
                >
                  Reintentar conexión
                </button>
              </div>
            )}

            {/* ──── EMPTY STATE ──── */}
            {!loading && !error && filteredData.length === 0 && (
              <div className="flex flex-col items-center justify-center py-16" style={{ animation: 'fade-in-up 0.5s ease-out both' }}>
                <div className="w-20 h-20 rounded-full bg-[#9463ae]/10 flex items-center justify-center mb-4">
                  <span className="text-4xl">📋</span>
                </div>
                <h2 className="text-xl font-bold text-[#121212] mb-2">Sin actividades</h2>
                <p className="text-slate-500 text-sm">No se encontraron actividades con los filtros seleccionados.</p>
              </div>
            )}

            {/* ══════════════════════════════════════════════════════════ */}
            {/* ──── PUBLIC VIEW (CARDS) ──── */}
            {/* ══════════════════════════════════════════════════════════ */}
            {!loading && !error && view === 'publico' && filteredData.length > 0 && (
              <div>
                {Object.entries(groupedByBloque).map(([bloque, items]) => (
                  <BlockGroupPublic key={bloque} bloque={bloque} items={items} />
                ))}
              </div>
            )}

            {/* ══════════════════════════════════════════════════════════ */}
            {/* ──── STAFF VIEW (TABLE) ──── */}
            {/* ══════════════════════════════════════════════════════════ */}
            {!loading && !error && view === 'staff' && filteredData.length > 0 && (
              <div className="rounded-2xl border border-slate-200/80 bg-white shadow-sm overflow-hidden" style={{ animation: 'fade-in-up 0.5s ease-out both' }}>
                <div className="overflow-x-auto">
                  <table className="w-full text-left">
                    <thead>
                      <tr className="bg-gradient-to-r from-[#22404d] to-[#121212] text-white">
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">ID</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">Horario</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">Actividad</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">Lugar</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">Bloque</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">Responsable</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider min-w-[220px]">Notas Técnicas</th>
                        <th className="px-4 py-3 text-xs font-bold uppercase tracking-wider">Estado</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {filteredData.map((item, i) => (
                        <StaffRow key={item.id || i} item={item} index={i} />
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* ══════ FOOTER ══════ */}
          <footer className="border-t border-slate-200/80 mt-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row items-center justify-between gap-3">
              <p className="text-xs text-slate-400">
                NAUFest 2026 · Dashboard de Gestión · Datos en vivo desde Google Sheets
              </p>
              <p className="text-xs text-slate-300">
                Powered by <span className="font-semibold text-[#2f5aae]">Sheetson API</span>
              </p>
            </div>
          </footer>
        </div>
      );
    };

    // ─── Mount ────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EventDashboard />);
  </script>
</body>
</html>
